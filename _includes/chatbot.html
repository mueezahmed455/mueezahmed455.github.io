<div class="widget-container" id="chatbotContainer" style="bottom: 20px; right: 20px; width: 350px;">
    <div class="glass-panel" id="chatbot">
        <div class="widget-header">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-robot" style="color: var(--accent-cyan);"></i>
                <span>NEURAL_CHAT_v4</span>
            </div>
            <div class="widget-controls">
                <button class="control-btn btn-min" onclick="toggleWidget('chatbot')"></button>
            </div>
        </div>
        <div class="chatbot-messages" id="chatMessages" style="height: 300px; overflow-y: auto; padding: 1rem;">
            <div class="chat-message bot">
                Hello! I'm Mueez's AI assistant. How can I help you today?
            </div>
        </div>
        <div class="chat-input-container" style="padding: 1rem; border-top: 1px solid var(--glass-border); display: flex; gap: 0.5rem;">
            <input type="text" class="chat-input" id="chatInput" placeholder="Enter command..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 4px; color: #fff; padding: 0.5rem;">
            <button class="metal-btn" id="chatSend" style="padding: 0.5rem 1rem;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<div class="music-player glass-panel" id="musicPlayer">
    <div class="music-controls">
        <button class="music-btn" id="musicPrev" title="Previous">
            <i class="fas fa-step-backward"></i>
        </button>
        <button class="music-btn" id="musicPlay" title="Play/Pause">
            <i class="fas fa-play"></i>
        </button>
        <button class="music-btn" id="musicNext" title="Next">
            <i class="fas fa-step-forward"></i>
        </button>
    </div>
    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>
    <div class="music-info">
        <div id="musicTitle">
            <marquee scrollamount="3">Lo-fi Coding Beats • 24/7 Focus Music</marquee>
        </div>
    </div>
</div>

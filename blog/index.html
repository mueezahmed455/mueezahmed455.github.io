---
layout: default
title: Blog
---

<div class="manga-panel">
    <div class="panel-corner top-left"></div>
    <div class="panel-corner top-right"></div>
    <div class="panel-corner bottom-left"></div>
    <div class="panel-corner bottom-right"></div>
    
    <h1 class="section-title">ブログ • BLOG</h1>
    
    <div class="blog-posts">
        {% for post in site.posts %}
        <article class="skill-box" style="margin-bottom: 2rem; cursor: pointer;" onclick="location.href='{{ post.url | relative_url }}'">
            <div class="timeline-date">{{ post.date | date: "%B %d, %Y" }}</div>
            <h2 class="skill-title">{{ post.title }}</h2>
            <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
            <div class="tech-tags">
                {% for tag in post.tags %}
                <span class="tech-tag">{{ tag }}</span>
                {% endfor %}
            </div>
        </article>
        {% else %}
        <p style="text-align: center;">No posts yet. Stay tuned!</p>
        {% endfor %}
    </div>
</div>

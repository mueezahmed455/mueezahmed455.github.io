---
layout: default
---

<article class="reveal" style="padding-top: 8rem; max-width: 900px; margin: 0 auto;">
    <div class="glass-panel" style="padding: 3rem; border-radius: 20px;">
        <header style="margin-bottom: 3rem; text-align: center;">
            <div style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; background: rgba(0, 247, 255, 0.1); border: 1px solid var(--accent-cyan); border-radius: 50px; font-size: 0.85rem; font-family: var(--font-mono); color: var(--accent-cyan); margin-bottom: 1.5rem;">
                <i class="fas fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}
            </div>
            <h1 style="font-size: clamp(1.75rem, 5vw, 2.5rem); margin-bottom: 1.5rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">{{ page.title }}</h1>
            {% if page.tags %}
            <div class="skill-items" style="justify-content: center;">
                {% for tag in page.tags %}
                <span class="skill-tag">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </header>

        <div class="post-content" style="font-size: 1.05rem; line-height: 1.9; color: rgba(255,255,255,0.85);">
            {{ content }}
        </div>
    </div>
    
    <div style="margin-top: 2rem; text-align: center;">
        <a href="{{ site.baseurl }}/blog/" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i>
            Back to Blog
        </a>
    </div>
</article>

<style>
.post-content h2 {
    font-size: 1.75rem;
    margin: 2.5rem 0 1rem;
    color: var(--accent-cyan);
}
.post-content h3 {
    font-size: 1.4rem;
    margin: 2rem 0 0.75rem;
}
.post-content p {
    margin-bottom: 1.25rem;
}
.post-content code {
    background: rgba(0, 247, 255, 0.1);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.9em;
    color: var(--accent-cyan);
}
.post-content pre {
    background: rgba(0, 0, 0, 0.5);
    padding: 1.5rem;
    border-radius: 12px;
    overflow-x: auto;
    margin: 1.5rem 0;
    border: 1px solid var(--glass-border);
}
.post-content pre code {
    background: none;
    padding: 0;
}
.post-content ul, .post-content ol {
    margin: 1rem 0 1rem 1.5rem;
}
.post-content li {
    margin-bottom: 0.5rem;
}
.post-content a {
    color: var(--accent-cyan);
    text-decoration: underline;
}
.post-content blockquote {
    border-left: 4px solid var(--accent-cyan);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    color: rgba(255,255,255,0.7);
    font-style: italic;
}
.post-content img {
    max-width: 100%;
    border-radius: 12px;
    margin: 1.5rem 0;
}
</style>

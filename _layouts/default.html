<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Mermaid.js -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
    
    <!-- Pyodide (Python Wasm) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ '/sw.js' | relative_url }}")
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</head>
<body data-theme="dark">
    
    <!-- CRT Overlay -->
    <div class="crt-overlay"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">LOADING...</div>
    </div>

    <!-- Manga Speed Lines -->
    <div class="speed-lines" id="speedLines"></div>

    <!-- Navigation -->
    {% include nav.html %}

    <!-- Weather Widget -->
    {% include weather.html %}

    <!-- Achievements Widget -->
    <div class="achievements-widget">
        <div style="font-weight: 700; margin-bottom: 0.5rem; text-align: center;">
            <span class="en-text">AWARDS</span>
        </div>
        <div class="achievement-badge">
            <span>🏆</span>
            <span style="font-size: 0.75rem;">
                <span class="en-text">Turkey Top 3</span>
            </span>
        </div>
        <div class="achievement-badge">
            <span>🥇</span>
            <span style="font-size: 0.75rem;">INTEL ISEF</span>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-player">
        <div class="music-controls">
            <button class="music-btn" id="musicPrev">⏮</button>
            <button class="music-btn" id="musicPlay">▶</button>
            <button class="music-btn" id="musicNext">⏭</button>
        </div>
        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>
        <div class="music-info">
            <div id="musicTitle">
                <marquee scrollamount="3" class="en-text">Lo-fi Coding Beats • 24/7 Focus Music</marquee>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        {{ content }}
    </main>

    <!-- Footer -->
    {% include footer.html %}

    <!-- Chatbot -->
    {% include chatbot.html %}

    <!-- Scroll to Top Button -->
    <div class="scroll-top" id="scrollTop">↑</div>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/performance.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal-kernel.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/neural-core.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/security-lab.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/multiplayer.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/three-bg.js' | relative_url }}"></script>
</body>
</html>

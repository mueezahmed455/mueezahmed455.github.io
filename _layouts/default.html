<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Graphics & Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ '/sw.js' | relative_url }}");
            });
        }
    </script>
</head>
<body class="metal-theme">
    <!-- Soundscape Elements (Hidden) -->
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="snd-hover" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-sys" src="https://assets.mixkit.co/active_storage/sfx/2555/2555-preview.mp3" preload="auto" loop></audio>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">INITIATING_NEURAL_LINK...</div>
        </div>
    </div>

    {% include nav.html %}
    {% include system-dashboard.html %}

    <!-- Global Hologram Overlay Container -->
    <div id="hologram-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9000;"></div>

    <div class="widget-container" id="weatherWidgetContainer" style="top: 100px; right: 20px;">
        <div class="glass-panel" id="weatherWidget">
            <div class="widget-header">
                <span><i class="fas fa-satellite"></i> METEO_SENSORS</span>
                <div class="widget-controls">
                    <button class="control-btn btn-min" onclick="toggleWidget('weatherWidget')"></button>
                </div>
            </div>
            <div style="padding: 1rem;">
                {% include weather.html %}
            </div>
        </div>
    </div>

    <div class="widget-container" id="achievementsWidgetContainer" style="top: 250px; right: 20px;">
        <div class="glass-panel" id="achievementsWidget">
            <div class="widget-header">
                <span><i class="fas fa-microchip"></i> RECOGNITION_CORE</span>
                <div class="widget-controls">
                    <button class="control-btn btn-min" onclick="toggleWidget('achievementsWidget')"></button>
                </div>
            </div>
            <div style="padding: 1rem;">
                {% include achievements.html %}
            </div>
        </div>
    </div>

    <main>
        {{ content }}
    </main>

    <div class="control-center glass-panel" id="controlCenter">
        <button class="metal-btn" onclick="toggleWidget('systemDashboard')" title="System Status"><i class="fas fa-bolt"></i></button>
        <button class="metal-btn" onclick="toggleWidget('weatherWidget')" title="Weather"><i class="fas fa-sun"></i></button>
        <button class="metal-btn" onclick="toggleWidget('achievementsWidget')" title="Achievements"><i class="fas fa-award"></i></button>
        <button class="metal-btn" onclick="toggleWidget('musicPlayer')" title="Music"><i class="fas fa-broadcast-tower"></i></button>
        <button class="metal-btn" onclick="toggleWidget('chatbot')" title="Neural AI"><i class="fas fa-brain"></i></button>
    </div>

    <div class="widget-container" id="musicPlayerContainer" style="bottom: 80px; left: 50%; transform: translateX(-50%); width: 450px;">
        <div class="glass-panel" id="musicPlayer">
            {% include music-player.html %}
        </div>
    </div>

    {% include chatbot.html %}

    <button class="scroll-top" id="scrollTop"><i class="fas fa-chevron-up"></i></button>
    {% include footer.html %}

    <!-- Scripts -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/performance.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal-kernel.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/neural-core.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/security-lab.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/multiplayer.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/three-bg.js' | relative_url }}"></script>
</body>
</html>
